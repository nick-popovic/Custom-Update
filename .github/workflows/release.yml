name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate checksum
        run: sha256sum update > update.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            update
            update.sha256
          generate_release_notes: true
